<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クイズ</title>
  <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
  <div class="container quiz-container">
    <div th:if="${!quizSession.endlessMode}">
      <div class="progress-text" th:text="|問題 ${index} / ${total}|">問題 1 / 10</div>
      <div class="progress-bar">
        <div class="progress-fill" th:style="|width: ${index * 100.0 / total}%|"></div>
      </div>
    </div>
    <div th:if="${quizSession.endlessMode}">
      <div class="progress-text" th:text="|${index} 問目|"></div>
    </div>

    <h1 class="question-text" th:text="${problem.question}">問題文</h1>

    <!-- 回答前：選択肢ボタン -->
    <div th:if="${!quizSession.answered}" class="account-table">
	  <div class="table-left">
      <form method="post" th:action="@{/quiz/answer}" class="choice-form">
        <button type="submit" name="selectedAnswer" value="資産" class="btn-choice">資産</button>
      </form>
	  </div>
	  <div class="table-right">
      <form method="post" th:action="@{/quiz/answer}" class="choice-form">
        <button type="submit" name="selectedAnswer" value="負債" class="btn-choice">負債</button>
      </form>
      <form method="post" th:action="@{/quiz/answer}" class="choice-form">
        <button type="submit" name="selectedAnswer" value="純資産" class="btn-choice">資本<br>（純資産）</button>
      </form>
	  </div>
	  </div>
	  <div th:if="${!quizSession.answered}" class="account-table">
	  <div class="table-left">
      <form method="post" th:action="@{/quiz/answer}" class="choice-form">
        <button type="submit" name="selectedAnswer" value="収益" class="btn-choice">収益</button>
      </form>
	  </div>
	  <div class="table-right">
      <form method="post" th:action="@{/quiz/answer}" class="choice-form">
        <button type="submit" name="selectedAnswer" value="費用" class="btn-choice">費用</button>
      </form>
	  </div>
    </div>

    <!-- 回答後：結果表示 -->
    <div th:if="${quizSession.answered}" class="result-section">
      <div class="result-badge" th:classappend="${quizSession.lastCorrect} ? 'correct' : 'wrong'">
        <span th:text="${quizSession.lastCorrect} ? '✓ 正解！' : '✗ 不正解'"></span>
      </div>

      <div class="result-details">
        <div class="result-item">
          <div class="result-label">あなたの回答：</div>
          <div class="result-value" th:text="${quizSession.lastSelectedAnswer}"></div>
        </div>
        <div class="result-item">
          <div class="result-label">正解：</div>
          <div class="result-value correct-answer" th:text="${quizSession.lastCorrectAnswer}"></div>
        </div>
      </div>

      <!-- 次の問題へ ※5問終了済みなら結果画面へと表示 -->
      <form method="post" th:action="@{/quiz/next}" class="button-form">
        <button type="submit" class="btn-next" th:text="${index == total} ? '結果を見る' : '次の問題へ'">次の画面へ</button>
      </form>
    </div>
  </div>
</body>
</html>
